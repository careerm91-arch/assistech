<!DOCTYPE html>
<html>
<head>
<title>Assistech Finder</title>

<style>
body{
font-family: Arial;
text-align:center;
padding:20px;
background:#f5f5f5;
}

select, button{
padding:10px;
margin:10px;
font-size:16px;
}

button{
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
}
</style>

</head>

<body>

<h2>ASSISTECH FINDER</h2>

<select id="disability">
<option>Vision</option>
<option>Hearing</option>
<option>Mobility</option>
<option>Speech</option>
<option>Cognitive</option>
</select>

<br>

<select id="task">
<option>Reading</option>
<option>Communication</option>
<option>Navigation</option>
<option>Phone Control</option>
<option>Learning</option>
</select>

<br>

<button onclick="startVoice()">🎤 Speak</button>
<p id="voiceStatus"></p>

<br>

<button onclick="showResult()">Find Assistive Apps</button>

<div id="result"></div>

<script>
let fullAppsList = [];//added new
// ===== RESULT FUNCTION =====
async function showResult(){

try{

let url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpdqK1vK59YwIgtHuYqjrIAmXXLelPIuqFmB4mPMisWlwHZ8ONbdh_YxZ8gu9_XmrC4t5uN0u_atGf/pub?output=csv";

let response = await fetch(url);
let data = await response.text();

let rows = data.trim().split("\n").map(r => r.split(","));

let d = document.getElementById("disability").value;
let t = document.getElementById("task").value;

let output = "";
let speechText = "";

rows.forEach((r, index) => {

if(index === 0) return;

if(r[0].trim().toLowerCase() === d.toLowerCase() &&
   r[1].trim().toLowerCase() === t.toLowerCase()){

let apps = r.slice(2);
fullAppsList = apps;//added new
let top3 = apps.slice(0,3);
let more = apps.slice(3);

output = "<b>Top 3 Apps:</b><br>" + top3.join("<br>");

// ✅ ADD THIS BLOCK
if(more.length > 0){
//output += `<br><br>
//output += "<br><br><b>More Apps:</b><br>🔒 Unlock to view more";
output += `<br><br><b>More Apps:</b><br>
<button onclick="unlockApps()">🔓 Unlock More Apps</button>`;
}

// SPEECH TEXT
speechText = "Top apps for " + d + " and " + t + " are " + top3.join(", ");

if(more.length > 0){
speechText += ". More apps are locked.";
}

}

});

// If no result
if(output==""){
output="No results found.";
speechText="No results found for selected options.";
}

// Show result
document.getElementById("result").innerHTML = output;

// Speak
speak(speechText);

}catch(error){

document.getElementById("result").innerHTML = "Error loading data.";
console.log(error);

}

}

// ===== VOICE INPUT =====
function startVoice(){

if (!('webkitSpeechRecognition' in window)) {
alert("Use Chrome browser");
return;
}

const recognition = new webkitSpeechRecognition();
recognition.lang = "en-IN";
recognition.start();

document.getElementById("voiceStatus").innerText = "Listening...";

recognition.onresult = function(event){

let speech = event.results[0][0].transcript.toLowerCase();

document.getElementById("voiceStatus").innerText = speech;

if(speech.includes("vision")) document.getElementById("disability").value="Vision";
if(speech.includes("hearing")) document.getElementById("disability").value="Hearing";
if(speech.includes("mobility")) document.getElementById("disability").value="Mobility";

if(speech.includes("reading")) document.getElementById("task").value="Reading";
if(speech.includes("communication")) document.getElementById("task").value="Communication";
if(speech.includes("navigation")) document.getElementById("task").value="Navigation";

showResult();
};

}

// ===== VOICE OUTPUT =====
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang = "en-IN";
speechSynthesis.speak(msg);
}
function unlockApps(){
 
let qrHTML = `
<h3>Scan & Pay ₹500</h3>
<img src="qr.png" width="250"><br><br>

<button onclick="confirmPayment()">✅ I Have Paid</button>
;

document.getElementById("result").innerHTML = qrHTML;

}
function confirmPayment(){

let fullListHTML = "<b>All Apps:</b><br>" + fullAppsList.join("<br>");

document.getElementById("result").innerHTML = fullListHTML;

}
</script>

</body>
</html>
