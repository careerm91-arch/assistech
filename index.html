<!DOCTYPE html>
<html>
<head>
<title>Assistech Finder</title>

<style>
body{
font-family: Arial;
text-align:center;
padding:20px;
}

#appContent{
display:none;
}

input, button, select{
padding:10px;
margin:10px;
font-size:16px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔒 Premium Access</h2>
<input type="password" id="password" placeholder="Enter Password">
<br>
<button onclick="checkPassword()">Unlock</button>
<p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="appContent">

<h2>ASSISTECH FINDER</h2>

<select id="disability">
<option>Vision</option>
<option>Hearing</option>
<option>Mobility</option>
<option>Speech</option>
<option>Cognitive</option>
</select>

<br>

<select id="task">
<option>Reading</option>
<option>Communication</option>
<option>Navigation</option>
<option>Phone Control</option>
<option>Learning</option>
</select>

<br>

<button onclick="showResult()">Find Assistive Apps</button>

<div id="result"></div>

</div>

<script>

// LOGIN
function checkPassword(){
var pass = document.getElementById("password").value;

if(pass === "TEST123"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("appContent").style.display = "block";
}else{
document.getElementById("error").innerText = "Wrong password!";
}
}

// TEMP TEST (NO SHEET)
function showResult(){

var d = document.getElementById("disability").value;
var t = document.getElementById("task").value;

if(d=="Vision" && t=="Reading"){
document.getElementById("result").innerHTML =
"<b>Top 3 Apps:</b><br>Lookout<br>Seeing AI<br>Be My Eyes";
}else{
document.getElementById("result").innerHTML="No results found";
}

}

</script>

</body>
</html>
