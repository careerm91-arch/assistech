<!DOCTYPE html>
<html>
<head>
<title>Assistech Finder</title>

<style>
body{
font-family: Arial;
text-align:center;
padding:20px;
}

#appContent{
display:none;
}

input, button, select{
padding:10px;
margin:10px;
font-size:16px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔒 Premium Access</h2>

<input type="password" id="password" placeholder="Enter Password">

<br><br>

<button onclick="checkPassword()">Unlock</button>

<p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="appContent">

<h2>ASSISTECH FINDER</h2>

<select id="disability">
<option>Vision</option>
<option>Hearing</option>
<option>Mobility</option>
<option>Speech</option>
<option>Cognitive</option>
</select>

<br>

<select id="task">
<option>Reading</option>
<option>Communication</option>
<option>Navigation</option>
<option>Phone Control</option>
<option>Learning</option>
</select>

<br>

<button onclick="showResult()">Find Assistive Apps</button>

<div id="result"></div>

<div id="paymentSection" style="display:none;">
<h3>🔒 Unlock Full Results</h3>
<p>Subscription: ₹500 / $10</p>
<button onclick="unlockAccess()">I Have Paid</button>
</div>

</div>

<script>

// LOGIN (WORKING)
function checkPassword(){
var pass = document.getElementById("password").value.trim();

if(pass === "TEST123"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("appContent").style.display = "block";
}else{
document.getElementById("error").innerText = "Wrong password!";
}
}

// PAYMENT FLAG
let paidUser = false;

// SIMPLE RESULT (NO SHEET FOR NOW)
function showResult(){

var d = document.getElementById("disability").value;
var t = document.getElementById("task").value;

if(d=="Vision" && t=="Reading"){

let top3 = ["Lookout","Seeing AI","Be My Eyes"];
let more = ["Voice Dream Reader","Envision AI"];

let output = "<b>Top 3 Apps:</b><br>" + top3.join("<br>");

if(paidUser){
output += "<br><br><b>More Apps:</b><br>" + more.join("<br>");
}else{
document.getElementById("paymentSection").style.display = "block";
}

document.getElementById("result").innerHTML = output;

}else{
document.getElementById("result").innerHTML = "No results found.";
}

}

// UNLOCK
function unlockAccess(){
paidUser = true;
document.getElementById("paymentSection").style.display = "none";
showResult();
}

</script>

</body>
</html>
